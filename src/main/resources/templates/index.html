<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ShopZone</title>

    <!-- CSS読み込み -->
    <link rel="stylesheet" href="/css/style.css">

    <!-- favicon -->
    <link rel="icon" type="image/png" href="/images/icon.png">
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="top-header">
            <div class="logo">ShopZone</div>

            <div class="search-bar">
                <input type="text" placeholder="商品を検索">
                <button>検索</button>
            </div>

            <div class="header-links">
                <div>ログイン</div>
                <div>注文履歴</div>
                <div>カート 🛒</div>
            </div>
        </div>

        <nav>
            <a href="#">ホーム</a>
            <a href="#">家電</a>
            <a href="#">ファッション</a>
            <a href="#">食品</a>
            <a href="#">ゲーム</a>
            <a href="#">セール</a>
        </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
        <div>
            <h1>BIG SALE</h1>
            <p>今だけ最大50%OFF</p>
        </div>
    </section>

    <!-- PRODUCT SECTION -->
    <div class="container">
        <h2 class="section-title">おすすめ商品</h2>

        <div class="products">

            <div class="product-card">
                <img src="https://picsum.photos/300/220?random=1" alt="商品画像">
                <div class="product-title">ワイヤレスイヤホン Bluetooth対応</div>
                <div class="rating">★★★★★</div>
                <div class="price">¥4,980</div>
                <button class="buy-btn">カートに追加</button>
            </div>

            <div class="product-card">
                <img src="https://picsum.photos/300/220?random=2" alt="商品画像">
                <div class="product-title">ゲーミングキーボード RGBライト</div>
                <div class="rating">★★★★☆</div>
                <div class="price">¥8,980</div>
                <button class="buy-btn">カートに追加</button>
            </div>

            <div class="product-card">
                <img src="https://picsum.photos/300/220?random=3" alt="商品画像">
                <div class="product-title">スマートウォッチ 健康管理対応</div>
                <div class="rating">★★★★★</div>
                <div class="price">¥12,800</div>
                <button class="buy-btn">カートに追加</button>
            </div>

            <div class="product-card">
                <img src="https://picsum.photos/300/220?random=4" alt="商品画像">
                <div class="product-title">ノートパソコン 15インチ</div>
                <div class="rating">★★★★☆</div>
                <div class="price">¥89,800</div>
                <button class="buy-btn">カートに追加</button>
            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 ShopZone All Rights Reserved.</p>
    </footer>

</body>
</html>
